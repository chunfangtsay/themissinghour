<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Hourly Rotation</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

#clock {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 28px;
    color: red;
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    z-index: 9999;
}
</style>
</head>

<body>

<iframe id="viewer"></iframe>

<div id="clock"></div>

<script>

const webcams = [
    "https://example1.com",
    "https://example2.com",
    "https://example3.com",
    "https://example4.com",
    "https://example5.com",
    "https://example6.com",
    "https://example7.com",
    "https://example8.com",
    "https://example9.com",
    "https://example10.com",
    "https://example11.com",
    "https://example12.com",
    "https://example13.com",
    "https://example14.com",
    "https://example15.com",
    "https://example16.com",
    "https://example17.com",
    "https://example18.com",
    "https://example19.com",
    "https://example20.com",
    "https://example21.com",
    "https://example22.com",
    "https://example23.com",
    "https://example24.com"
];

let currentHour = -1;

function loadCurrentCamera() {

    const now = new Date();
    const hour = now.getHours();

    if (hour !== currentHour) {

        currentHour = hour;

        const url = webcams[hour];

        document.getElementById("viewer").src = url;

        console.log(
            `Hour ${hour}: Loading ${url}`
        );
    }
}

function updateClock() {

    const now = new Date();

    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    document.getElementById("clock").textContent =
        `${h}:${m}:${s}`;
}

loadCurrentCamera();

setInterval(loadCurrentCamera, 1000);

setInterval(updateClock, 1000);

updateClock();

</script>

</body>
</html>
